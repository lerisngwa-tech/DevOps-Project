apiVersion: v1
kind: Service
metadata:
  name: {{ include "task-tracker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "task-tracker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "task-tracker.labels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
